<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* 白天模式 */
        body.day-mode {
            background-color: #f5f5f5;
            color: #1a1a1a;
        }

        /* 夜晚模式 */
        body.night-mode {
            background-color: #0d0d0d;
            color: #d4ff00;
        }

        /* 切换按钮容器 */
        .toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        /* 切换按钮 */
        .toggle-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 白天模式按钮样式 */
        body.day-mode .toggle-btn {
            background-color: #1a1a1a;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        body.day-mode .toggle-btn:hover {
            background-color: #333333;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* 夜晚模式按钮样式 */
        body.night-mode .toggle-btn {
            background-color: #d4ff00;
            color: #0d0d0d;
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.5);
        }

        body.night-mode .toggle-btn:hover {
            background-color: #e5ff4d;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(212, 255, 0, 0.7);
        }

        /* 主内容 */
        .greeting {
            text-align: center;
        }

        .greeting h1 {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        body.day-mode .greeting h1 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        body.night-mode .greeting h1 {
            text-shadow: 0 0 40px rgba(212, 255, 0, 0.6),
                         0 0 80px rgba(212, 255, 0, 0.3);
        }

        .greeting p {
            font-size: 1.5rem;
            opacity: 0.8;
            transition: all 0.5s ease;
        }

        body.night-mode .greeting p {
            text-shadow: 0 0 10px rgba(212, 255, 0, 0.3);
        }

        /* 装饰元素 */
        .decoration {
            margin-top: 40px;
            font-size: 3rem;
            transition: all 0.5s ease;
        }

        body.day-mode .decoration {
            opacity: 0.6;
        }

        body.night-mode .decoration {
            opacity: 1;
            text-shadow: 0 0 20px rgba(212, 255, 0, 0.8);
        }

        /* 图标 */
        .icon {
            font-size: 20px;
        }
    </style>
</head>
<body class="day-mode">
    <!-- 切换按钮 -->
    <div class="toggle-container">
        <button class="toggle-btn" onclick="toggleMode()">
            <span class="icon" id="mode-icon">🌙</span>
            <span id="mode-text">夜间模式</span>
        </button>
    </div>

    <!-- 主内容 -->
    <div class="greeting">
        <h1>你好，世界！</h1>
        <p>欢迎来到这个简单的页面</p>
        <div class="decoration">✨</div>
    </div>

    <script>
        function toggleMode() {
            const body = document.body;
            const icon = document.getElementById('mode-icon');
            const text = document.getElementById('mode-text');

            if (body.classList.contains('day-mode')) {
                // 切换到夜间模式
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                icon.textContent = '☀️';
                text.textContent = '白天模式';
            } else {
                // 切换到白天模式
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                icon.textContent = '🌙';
                text.textContent = '夜间模式';
            }
        }
    </script>
</body>
</html>
